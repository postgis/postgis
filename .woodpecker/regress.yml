labels:
  platform: linux/amd64
when:
  event: [push, pull_request, tag]
variables:
  test-image: &test-image repo.osgeo.org/postgis/build-test:debian13
  steps-env: &steps-env
    - export PATH=/usr/lib/postgresql/$${PGVER}/bin:$${PATH}
    - export PGHOST=/tmp
    - export PGPORT=$$(grep ^port /etc/postgresql/$${PGVER}/main/postgresql.conf | awk '{print $$3}')
    - export POSTGIS_REGRESS_DB_OWNER=postgis_reg_unprivileged_user
    - export RUNTESTFLAGS="-v
      --after-create-db-script $${CI_WORKSPACE}/regress/hooks/configure-pgextwlist.sql
      --after-create-db-script $${CI_WORKSPACE}/regress/hooks/standard-conforming-strings-off.sql"
    - export SRCDIR=$${CI_WORKSPACE}
    - export BUILDDIR=$${SRCDIR}/build/pg$${PGVER}
    - export CURRENTVERSION=$$(grep '^POSTGIS_' $${SRCDIR}/Version.config | cut -d= -f2 | paste -sd '.')
    - pg_config --version
  steps-start-postgresql: &steps-start-postgresql
    # The test image can need crash recovery after clone-local startup. Under
    # multi-workflow I/O load, Debian's default 60-second pg_ctl wait is short.
    # Use /tmp for the socket: runner-specific /run mounts are not portable.
    - runuser -u postgres -- pg_ctl
      -D /var/lib/postgresql/$${PGVER}/main
      -l /tmp/postgresql-$${PGVER}.log
      -o "-c config_file=/etc/postgresql/$${PGVER}/main/postgresql.conf -c unix_socket_directories=/tmp"
      -t 300 start
    - psql -c 'select version()' template1
  steps-pg-build: &steps-pg-build
    - mkdir -p "$${BUILDDIR}"
    - cd "$${BUILDDIR}"
    - $${SRCDIR}/configure
      --with-library-minor-version
      --disable-spellcheck-tests
      --enable-lto
      --without-interrupt-tests
      CFLAGS="-O2 -Wall -fno-omit-frame-pointer -Werror"
    # Matrix jobs provide the parallelism. Keep each build serial: the PostGIS
    # make graph can otherwise race generation of files such as postgis.control.
    - make -j1
  steps-pg-test-all-upgrades: &steps-pg-test-all-upgrades
    - cd "$${BUILDDIR}"
    - export CHECK_FIFO=check-$${UPGRADE_EXTENSION}.fifo
    - export CHECK_LOG=check-$${UPGRADE_EXTENSION}.log
    - rm -f "$${CHECK_FIFO}"
    - mkfifo "$${CHECK_FIFO}"
    - tee "$${CHECK_LOG}" < "$${CHECK_FIFO}" &
    - UPGRADECHECK_ARGS=
    - if test "$${CI_PIPELINE_EVENT}" = pull_request; then UPGRADECHECK_ARGS=--oldest; fi
    - $${SRCDIR}/utils/check_all_upgrades.sh -s $${UPGRADECHECK_ARGS} --extension $${UPGRADE_EXTENSION} $${CURRENTVERSION}! > "$${CHECK_FIFO}"
    - wait # for tee process to flush its buffers
    - rm -f "$${CHECK_FIFO}"
    - echo "-- Summary of upgrade tests --"
    - egrep '(PASS|FAIL|SKIP|INFO|ERROR)' "$${CHECK_LOG}"

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 50
      partial: false

steps:
  autogen:
    image: *test-image
    pull: true
    commands:
      - ./autogen.sh

  build:
    image: *test-image
    depends_on: autogen
    commands:
      - <<: *steps-env
      - <<: *steps-pg-build

  build-second-postgresql:
    image: *test-image
    depends_on: autogen
    when:
      - matrix:
          REGRESS_SUITE: cluster-upgrade
    commands:
      - export PGVER=$${SECOND_PGVER}
      - <<: *steps-env
      - <<: *steps-pg-build

  test-preinstall:
    image: *test-image
    depends_on: build
    when:
      - matrix:
          REGRESS_SUITE: preinstall
    commands:
      - <<: *steps-env
      - <<: *steps-start-postgresql
      - make -C "$${BUILDDIR}" $${REGRESS_TARGET}

  test-install:
    image: *test-image
    depends_on: build
    when:
      - matrix:
          REGRESS_SUITE: install
    commands:
      - <<: *steps-env
      - <<: *steps-start-postgresql
      - make -C "$${BUILDDIR}" install
      - make -C "$${BUILDDIR}" $${REGRESS_TARGET}

  test-upgrades:
    image: *test-image
    depends_on: build
    when:
      - matrix:
          REGRESS_SUITE: extension-upgrade
    commands:
      - <<: *steps-env
      - <<: *steps-start-postgresql
      - make -C "$${BUILDDIR}" staged-install
      - make -C "$${BUILDDIR}" install
      - <<: *steps-pg-test-all-upgrades

  test-cluster-upgrade:
    image: *test-image
    depends_on: [ build, build-second-postgresql ]
    when:
      - matrix:
          REGRESS_SUITE: cluster-upgrade
    commands:
      - make -C build/pg$${PGVER} install
      - make -C build/pg$${SECOND_PGVER} install
      - su postgres -c 'utils/check_cluster_upgrade.sh -i regress/hooks/cluster-upgrade-geography.sql /usr/lib/postgresql/'$${PGVER}'/bin/pg_config /usr/lib/postgresql/'$${SECOND_PGVER}'/bin/pg_config'

# Every entry is an independent workflow with its own clone, workspace,
# containers, PostgreSQL instance, and regression database. Splitting at this
# boundary lets Woodpecker schedule the long suites across agents safely.
matrix:
  include:
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: preinstall
      REGRESS_TARGET: check
      UPGRADE_EXTENSION: none
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: preinstall
      REGRESS_TARGET: check-double-upgrade
      UPGRADE_EXTENSION: none
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: preinstall
      REGRESS_TARGET: check-locked-upgrade
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: preinstall
      REGRESS_TARGET: check
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: preinstall
      REGRESS_TARGET: check-double-upgrade
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: preinstall
      REGRESS_TARGET: check-locked-upgrade
      UPGRADE_EXTENSION: none
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-base
      UPGRADE_EXTENSION: none
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-unpackaged
      UPGRADE_EXTENSION: none
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-unpackaged-by-func
      UPGRADE_EXTENSION: none
    - PGVER: "14"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-packaged-by-func
      UPGRADE_EXTENSION: none
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-base
      UPGRADE_EXTENSION: none
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-unpackaged
      UPGRADE_EXTENSION: none
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-unpackaged-by-func
      UPGRADE_EXTENSION: none
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-packaged-by-func
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-base
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-unpackaged
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
      REGRESS_TARGET: installcheck-upgrade-from-unpackaged-by-func
      UPGRADE_EXTENSION: none
    - PGVER: "18"
      SECOND_PGVER: "0"
      REGRESS_SUITE: install
