      UPGRADE_EXTENSION: none
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: extension-upgrade
      REGRESS_TARGET: none
      UPGRADE_EXTENSION: postgis
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: extension-upgrade
      REGRESS_TARGET: none
      UPGRADE_EXTENSION: postgis_topology
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: extension-upgrade
