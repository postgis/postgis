      UPGRADE_EXTENSION: postgis_raster
    - PGVER: "16"
      SECOND_PGVER: "0"
      REGRESS_SUITE: extension-upgrade
      REGRESS_TARGET: none
      UPGRADE_EXTENSION: postgis_sfcgal
    - PGVER: "14"
