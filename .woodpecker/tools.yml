labels:
  platform: linux/amd64
when:
  event: [push, pull_request, tag]

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      depth: 0
      partial: false

steps:
  build:
    image: repo.osgeo.org/postgis/build-test:debian13
    pull: true
    commands:
      - sh ci/dronie/postgis_tools.sh
